    query: "In Kubernetes 1.30, is `ValidatingAdmissionPolicy` still beta / feature-gated, or did it reach GA with the stable API already?"
    intent: "Determine whether Kubernetes 1.30 treats ValidatingAdmissionPolicy as a stable built-in feature."
    difficulty: medium
    tech_area: kubernetes

    ground_truth:
      must_contain_domains:
        - pattern: "kubernetes.io"
          rationale: "Official Kubernetes release blogs and reference docs are the primary source for feature state and API maturity."
        - pattern: "v1-30.docs.kubernetes.io"
          rationale: "Version-pinned Kubernetes 1.30 docs are especially valuable for confirming the exact feature state in that release."

      must_contain_terms:
        - term: "ValidatingAdmissionPolicy"
          rationale: "The answer must name the feature precisely."
        - term: "GA"
          rationale: "The core question is whether the feature reached general availability."
        - term: "admissionregistration.k8s.io/v1"
          rationale: "A correct answer should mention the stable API version."
        - term: "v1.30"
          rationale: "The release boundary matters for the compatibility question."

      forbidden_domains:
        - pattern: "jb51.net"
          rationale: "Kubernetes feature-gate tutorials there often preserve outdated alpha/beta instructions."
        - pattern: "baijiahao.baidu.com"
          rationale: "Content-farm Kubernetes summaries often strip the exact API version and maturity details."

      expected_source_types:
        - docs
        - general_web
