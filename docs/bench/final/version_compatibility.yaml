batch:
  category: version_compatibility
  count: 8
  generator: gpt-5.4
  generated_at: "2026-04-11T20:27:07Z"
  notes: |
    This batch focuses on real version-bound ecosystem questions that a coding agent would plausibly ask when upgrading or evaluating compatibility boundaries: Go language semantics, JavaScript tooling defaults, Kubernetes feature maturity, SQLite storage capabilities, Next.js breaking request API changes, FastAPI's temporary Pydantic migration window, SQLAlchemy 2.0 execution model changes, and Spring Boot's 3.3-to-3.4 framework-alignment boundary. It spans 7 distinct tech areas and favors questions where the answer depends on current release notes, migration guides, or version-pinned official docs rather than general background knowledge.

queries:
  - id: vc_001
    type: version_compatibility
    query: "In Go 1.22, do `for range` loop variables still have the old closure-capture behavior, or did that change only for modules that declare `go 1.22`?"
    intent: "Determine whether the loop-variable semantic change applies and where the compatibility boundary actually is."
    difficulty: medium
    tech_area: go_ecosystem

    ground_truth:
      must_contain_domains:
        - pattern: "go.dev"
          rationale: "The official Go blog, release notes, FAQ, and issue redirects document the Go 1.22 loop-variable change."
        - pattern: "pkg.go.dev"
          rationale: "Go tool and analyzer docs on pkg.go.dev help confirm how the old closure-capture guidance changed after 1.22."

      must_contain_terms:
        - term: "per-iteration"
          rationale: "A correct answer must state that loop variables now have per-iteration semantics."
        - term: "go.mod"
          rationale: "The compatibility boundary is tied to the module's declared Go version."
        - term: "go 1.22"
          rationale: "The exact language version gate is central to the question."
        - term: "closure"
          rationale: "The motivating bug pattern is closure or goroutine capture of loop variables."

      forbidden_domains:
        - pattern: "baijiahao.baidu.com"
          rationale: "Go release reposts there often omit the go.mod opt-in compatibility detail."
        - pattern: "m.blog.csdn.net"
          rationale: "Mirrored Go upgrade posts often flatten the semantic change into an unconditional language-wide behavior."

      expected_source_types:
        - docs
        - code
        - community

      canonical_answer: |
        Go 1.22 changes `for`/`range` loop variables to per-iteration scope, which fixes the classic closure-capture bug. But that new behavior only applies in packages belonging to modules whose `go.mod` declares `go 1.22` or later; older modules keep the previous semantics for compatibility.

    reviewer_notes: "Strong answers may also mention the Go 1.21 preview via GOEXPERIMENT=loopvar, but the go.mod version gate is the key point."

  - id: vc_002
    type: version_compatibility
    query: "In ESLint 9, can a project still rely on `.eslintrc.*` as the normal default, or is flat config with `eslint.config.js` now the default and legacy config only opt-in?"
    intent: "Clarify the default configuration format and migration fallback in ESLint 9."
    difficulty: medium
    tech_area: devtools

    ground_truth:
      must_contain_domains:
        - pattern: "eslint.org"
          rationale: "ESLint's official blog and migration guide are the canonical sources for the v9 config rollout."
        - pattern: "github.com"
          rationale: "Official ESLint issues and ecosystem migration discussions on GitHub often clarify practical upgrade behavior."

      must_contain_terms:
        - term: "flat config"
          rationale: "The answer must identify the new default config system by name."
        - term: "eslint.config.js"
          rationale: "This is the default config filename in ESLint 9."
        - term: ".eslintrc"
          rationale: "The question is specifically about legacy config compatibility."
        - term: "ESLINT_USE_FLAT_CONFIG"
          rationale: "This environment variable is the documented opt-in escape hatch for using eslintrc in v9."

      forbidden_domains:
        - pattern: "jb51.net"
          rationale: "Machine-translated JavaScript tooling guides there are often stale and version-muddled."
        - pattern: "m.blog.csdn.net"
          rationale: "Mirrored frontend migration posts often conflate ESLint 8 and 9 behavior."

      expected_source_types:
        - docs
        - code
        - community

      canonical_answer: |
        In ESLint 9, flat config is the default and the CLI now looks for `eslint.config.js` rather than auto-discovering `.eslintrc.*`. Legacy eslintrc still works in v9 only as a deprecated opt-in path, typically by setting `ESLINT_USE_FLAT_CONFIG=false`, and it is scheduled for full removal in v10.

    reviewer_notes: "Accept answers that also mention the Node.js version floor change in v9, but they must clearly answer the config-default question."

  - id: vc_003
