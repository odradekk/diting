        ground_truth:
          must_contain_domains:
            - pattern: "docs.docker.com"
              rationale: "Docker docs are authoritative on build context, Dockerfile semantics, and .dockerignore."
            - pattern: "github.com"
              rationale: "BuildKit and Docker issues often show this exact error path."
            - pattern: "stackoverflow.com"
