          must_contain_terms:
            - term: "build context"
              rationale: "This is the primary concept behind the missing-path error."
            - term: ".dockerignore"
              rationale: "Files can exist in the repo but be excluded from the context."
            - term: "COPY"
              rationale: "The error arises from COPY/ADD path resolution."
            - term: "Dockerfile"
              rationale: "A correct answer should tie the issue to Dockerfile path semantics."

          forbidden_domains:
            - pattern: "markaicode.com"
              rationale: "SEO Docker troubleshooting pages often recommend moving files around without explaining context rules."
