      - id: et_003
        type: error_troubleshooting
        query: "Why does SQLAlchemy 2.x raise `ObjectNotExecutableError: Not an executable object: 'SELECT 1'` for raw SQL that worked in 1.4?"
        intent: "Identify the SQLAlchemy 2.0 execution-model change and the correct replacement for passing raw string SQL."
        difficulty: medium
        tech_area: python_ecosystem

        ground_truth:
          must_contain_domains:
            - pattern: "docs.sqlalchemy.org"
              rationale: "Official SQLAlchemy docs define ObjectNotExecutableError and the 2.0 execution model."
            - pattern: "github.com"
              rationale: "SQLAlchemy issues and migration discussions document this exact breaking change."
            - pattern: "stackoverflow.com"
              rationale: "Highly upvoted answers explain the common migration pitfall and the practical fix."

          must_contain_terms:
            - term: "ObjectNotExecutableError"
              rationale: "The specific exception should be named, not paraphrased away."
            - term: "text()"
              rationale: "Wrapping textual SQL in text() is the standard fix."
            - term: "exec_driver_sql()"
              rationale: "This is the other idiomatic path for driver-level raw SQL execution."
            - term: "SQLAlchemy 2.0"
              rationale: "The answer must tie the failure to the 2.0 behavior change."

          forbidden_domains:
            - pattern: "jb51.net"
              rationale: "Machine-translated SQLAlchemy articles often miss the 2.0 migration context."
            - pattern: "m.blog.csdn.net"
              rationale: "Mirror posts frequently prescribe downgrades without explaining executable SQL objects."

          expected_source_types:
            - docs
            - code
            - community

          canonical_answer: |
            In SQLAlchemy 2.0, passing a plain Python string to `.execute()` is no longer treated as executable SQL.
            Wrap the query with `text()` or use `exec_driver_sql()` on a connection; the old 1.4 behavior was deprecated
            and then removed.

        reviewer_notes: "A fallback answer that only says 'downgrade SQLAlchemy' is incomplete unless it explains the actual 2.0 API change."

