            - pattern: "github.com"
              rationale: "Kubernetes issues and examples capture common confusion around successful exit loops."
            - pattern: "stackoverflow.com"
              rationale: "Community answers often explain why a successful one-shot process still crashes under a Deployment."

          must_contain_terms:
            - term: "CrashLoopBackOff"
              rationale: "The answer must address the specific pod state."
            - term: "restartPolicy"
              rationale: "Restart behavior is controlled at the pod level."
            - term: "Deployment"
              rationale: "The controller choice is part of the root cause."
            - term: "Job"
              rationale: "A correct answer should usually point to Job/CronJob for one-shot workloads."

          forbidden_domains:
            - pattern: "baijiahao.baidu.com"
              rationale: "SEO posts about Kubernetes pod failures often conflate liveness failures with normal exits."
            - pattern: "m.blog.csdn.net"
              rationale: "Copied CrashLoopBackOff lists often miss the controller semantics behind exit code 0 loops."

          expected_source_types:
