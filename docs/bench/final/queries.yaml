      - id: et_006
        type: error_troubleshooting
        query: "Why does PostgreSQL return `could not serialize access due to read/write dependencies among transactions` under `SERIALIZABLE` even when my transaction only updates one row by primary key?"
        intent: "Explain that SERIALIZABLE transactions can fail due to SSI dependency cycles and therefore require retry logic."
        difficulty: hard
        tech_area: databases

        ground_truth:
          must_contain_domains:
            - pattern: "postgresql.org"
              rationale: "PostgreSQL docs define SERIALIZABLE isolation, SSI, and serialization failures."
            - pattern: "dba.stackexchange.com"
              rationale: "DBA-focused discussions explain why apparently simple transactions can still be aborted under SSI."
            - pattern: "stackoverflow.com"
              rationale: "Practical answers often cover retry strategies and isolation-level trade-offs."

          must_contain_terms:
            - term: "SERIALIZABLE"
              rationale: "The isolation level is the key reason the error is legitimate."
            - term: "serialization failure"
              rationale: "A correct answer should name the failure class, not treat it as random corruption."
            - term: "retry"
              rationale: "The standard remedy is retrying the entire transaction."
            - term: "read/write dependencies"
              rationale: "This is the distinguishing SSI-specific error mechanism named in the query."

          forbidden_domains:
            - pattern: "jb51.net"
              rationale: "Generic database mirror sites often confuse row locks with serializable transaction semantics."
            - pattern: "baijiahao.baidu.com"
              rationale: "Content farms often present this as a PostgreSQL bug instead of expected isolation behavior."

          expected_source_types:
            - docs
            - community

          canonical_answer: |
            Under PostgreSQL `SERIALIZABLE`, PostgreSQL uses Serializable Snapshot Isolation and may abort a transaction when
            it detects dangerous read/write dependency cycles, even if your write ultimately targets a single row by primary
            key. This is expected behavior: treat it as a serialization failure, retry the whole transaction, or choose a
            weaker isolation or explicit locking strategy if that better fits the workload.

        reviewer_notes: "Answers that mention the `concurrent update` variant or REPEATABLE READ are acceptable only if they clearly distinguish those from this SSI-specific `read/write dependencies among transactions` case."

      - id: et_007
        type: error_troubleshooting
        query: "Why does a Kubernetes Deployment go into `CrashLoopBackOff` even though the container process exits with code 0 every time?"
        intent: "Determine whether the workload is the wrong controller type rather than a failing process."
        difficulty: medium
        tech_area: kubernetes

        ground_truth:
          must_contain_domains:
            - pattern: "kubernetes.io"
