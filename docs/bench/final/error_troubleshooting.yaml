      canonical_answer: |
        Starting with Android 12 behavior for apps targeting API 31+, any activity, service, or receiver with an
        `intent-filter` must explicitly declare `android:exported="true"` or `"false"`. If you already set it on your
        own activity, the missing declaration may be coming from a library manifest, so inspect the merged manifest too.

    reviewer_notes: "Accept answers that mention launcher activities should usually be exported=true and many internal components false."

  - id: et_015
    type: error_troubleshooting
    query: "Why does `tokio::spawn` fail with `future cannot be sent between threads safely` when the async block captures an `Rc<RefCell<_>>`?"
    intent: "Explain the Send requirement on spawned Tokio tasks and the mismatch with Rc/RefCell."
    difficulty: hard
    tech_area: rust_ecosystem

    ground_truth:
      must_contain_domains:
        - pattern: "tokio.rs"
          rationale: "Tokio documentation explains task spawning requirements and runtime behavior."
        - pattern: "docs.rs"
          rationale: "The generated crate docs describe `tokio::spawn` trait bounds precisely."
        - pattern: "doc.rust-lang.org"
          rationale: "Rust std docs define why Rc and RefCell are not Send across threads."
        - pattern: "users.rust-lang.org"
          rationale: "The Rust forum has many canonical explanations of Send, LocalSet, and spawn_local."

      must_contain_terms:
        - term: "Send"
          rationale: "This trait bound is the core reason the future cannot be spawned."
        - term: "Rc<RefCell<_>>"
          rationale: "The captured type in the query is specifically non-Send."
        - term: "Arc<Mutex<_>>"
          rationale: "This is the standard thread-safe replacement pattern."
        - term: "spawn_local"
          rationale: "A correct answer should mention the local-task alternative when Send is not desired."

      forbidden_domains:
        - pattern: "jb51.net"
          rationale: "Generic Rust reposts often suggest unsafe workarounds instead of explaining Send semantics."
        - pattern: "baijiahao.baidu.com"
          rationale: "Content-farm summaries frequently blur the distinction between async lifetime errors and Send errors."

      expected_source_types:
        - docs
        - community

      canonical_answer: |
        `tokio::spawn` may move a task between worker threads, so the future it runs must be `Send`. An async block that
        captures `Rc<RefCell<_>>` is not `Send`, which causes the compiler error; use `Arc<Mutex<_>>`, restructure the
        ownership, or run the task on a `LocalSet` with `spawn_local`.

    reviewer_notes: "A complete answer should mention that `tokio::spawn` also requires `'static`, but Send is the main issue here."
