          rationale: "Copied Android build-fix posts often recommend downgrading SDKs instead of addressing the manifest rule."
        - pattern: "m.blog.csdn.net"
          rationale: "Mirror posts frequently stop at adding exported to MainActivity and ignore merged-manifest dependencies."

      expected_source_types:
