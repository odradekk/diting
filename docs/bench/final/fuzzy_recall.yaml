      canonical_answer: |
        That tool is Litestream. It continuously replicates SQLite WAL segments to object storage such as S3 for backup and point-in-time restore; it predates and differs from LiteFS, which focuses on networked replication via a FUSE filesystem.

    reviewer_notes: "The answer should distinguish Litestream from LiteFS; the S3/WAL clue points to Litestream."

