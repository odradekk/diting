  - id: fr_004
    type: fuzzy_recall
    query: "I’m trying to remember the SQLite replication/backup tool that continuously ships WAL changes to S3-compatible object storage, written in Go and widely discussed before LiteFS showed up. What was its name?"
    intent: "Identify the SQLite backup/replication tool from partial implementation clues so the caller can compare it against newer alternatives."
    difficulty: hard
    tech_area: databases

    ground_truth:
