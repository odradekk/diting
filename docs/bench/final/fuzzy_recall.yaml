          rationale: "The answer must name the tool exactly."
        - term: "SQLite"
          rationale: "The tool is specifically for SQLite, not a generic database backup system."
        - term: "WAL"
          rationale: "Streaming WAL changes is the defining mechanism."
        - term: "S3"
          rationale: "The object-storage replication clue should be reflected in a correct answer."

      forbidden_domains:
        - pattern: "hostol.com"
          rationale: "SEO spam pages about SQLite tooling provide no authoritative detail."
        - pattern: "markaicode.com"
          rationale: "This domain is a known low-quality scraper for developer topics."

      expected_source_types:
